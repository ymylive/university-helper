name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel older runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · type · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: easylearning
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: main_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U easylearning -d main_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install ruff bandit

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Bandit (security)
        run: bandit -r app/ -ll --skip B101

      - name: Pytest with coverage
        env:
          ENV: dev
          MAIN_DB_HOST: localhost
          MAIN_DB_PORT: "5432"
          MAIN_DB_NAME: main_db
          MAIN_DB_USER: easylearning
          MAIN_DB_PASSWORD: testpw
          SECRET_KEY: test_secret_key_for_testing_only_min_32_chars
          CORS_ORIGINS: '["http://localhost:3000"]'
          ENFORCE_HTTPS: "false"
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build

      - name: npm audit (high+critical only, non-blocking)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  docker-build:
    name: Docker image · trivy scan
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: false
          load: true
          tags: university-helper:ci
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple
            PIP_TRUSTED_HOST=pypi.org

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: university-helper:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"  # report-only initially; flip to 1 after baseline cleanup
