[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=app --cov-config=.coveragerc --cov-report=term-missing
env =
    SECRET_KEY=test_secret_key_for_testing_only_min_32_chars
    CORS_ORIGINS=["http://localhost:3000"]
    MAIN_DB_USER=test_user
    MAIN_DB_PASSWORD=test_password
    ENFORCE_HTTPS=false
