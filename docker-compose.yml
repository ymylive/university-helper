services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-learning-app
    restart: unless-stopped
    environment:
      MAIN_DB_HOST: postgres
      MAIN_DB_NAME: main_db
      MAIN_DB_USER: easylearning
      MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIN_DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      SHUAKE_COMPAT_SECRET: ${SHUAKE_COMPAT_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENFORCE_HTTPS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - easy-learning-network
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"

  postgres:
    image: postgres:15-alpine
    container_name: easy-learning-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: easylearning
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - easy-learning-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easylearning -d main_db"]
      interval: 10s
      timeout: 5s
      retries: 8

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: easy-learning-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - easy-learning-network

networks:
  easy-learning-network:
    driver: bridge

volumes:
  postgres-data:
