version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-learning-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signin}:${POSTGRES_PASSWORD:-signin123}@postgres:5432/${POSTGRES_DB:-unified_signin}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easy-learning-network
    volumes:
      - app-data:/app/data

  postgres:
    image: postgres:15-alpine
    container_name: easy-learning-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-signin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-signin123}
      - POSTGRES_DB=${POSTGRES_DB:-unified_signin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - easy-learning-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easy-learning-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - easy-learning-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: easy-learning-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - easy-learning-network

networks:
  easy-learning-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  app-data:
